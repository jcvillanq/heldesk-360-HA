global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['hd360_prometheus:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['hd360_node_exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['hd360_cadvisor:8080']
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - hd360_alertmanager:9093
rule_files:
  - "alerts.yml"