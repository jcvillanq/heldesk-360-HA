# ===================================================
# Infraticket - docker-compose.yml
# ENTORNO: LOCAL (Docker Desktop en Windows)
# ===================================================
#
# Acceso a los servicios (añade estas líneas a tu archivo hosts):
#   127.0.0.1   glpi.infraticket.local
#   127.0.0.1   traefik.infraticket.local
#   127.0.0.1   ldap.infraticket.local
#   127.0.0.1   grafana.infraticket.local
#   127.0.0.1   prometheus.infraticket.local
#   127.0.0.1   alertmanager.infraticket.local
#
# En Windows el archivo hosts está en:
#   C:\Windows\System32\drivers\etc\hosts
# ===================================================

services:

  # ==========================================================
  # 0. SOCKET PROXY
  # ==========================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: infraticket_socket_proxy
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - INFO=1
      - VERSION=1
      - EVENTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - socket-proxy

  # ==========================================================
  # 1. TRAEFIK v2
  # ==========================================================
  traefik:
    image: traefik:v2.11
    container_name: infraticket_traefik
    depends_on:
      - socket-proxy
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.infraticket.local`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
    restart: unless-stopped
    networks:
      - frontend
      - socket-proxy

  # ==========================================================
  # 2. MARIADB
  # ==========================================================
  mariadb:
    image: mariadb:11.7
    container_name: infraticket_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysqld
      # - ./init/infraticket_tables.sql:/docker-entrypoint-initdb.d/infraticket_tables.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ==========================================================
  # 3. GLPI
  # ==========================================================
  glpi:
    image: diouxx/glpi:latest
    container_name: infraticket_glpi
    volumes:
      - glpi_data:/var/www/html/glpi
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TIMEZONE: ${TIMEZONE}
      MARIADB_HOST: mariadb
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glpi.rule=Host(`glpi.infraticket.local`)"
      - "traefik.http.routers.glpi.entrypoints=web"
      - "traefik.http.services.glpi.loadbalancer.server.port=80"
      - "traefik.docker.network=infraticket_frontend"
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # ==========================================================
  # 4. OPENLDAP
  # ==========================================================
  openldap:
    image: osixia/openldap:1.5.0
    container_name: infraticket_openldap

    environment:
      LDAP_ORGANISATION: Infraticket
      LDAP_DOMAIN: infraticket.local
      LDAP_ADMIN_PASSWORD: LdapLocal789!
      LDAP_TLS: "false"

    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

    networks:
      - backend

    restart: unless-stopped

    healthcheck:
      test: [
        "CMD",
        "ldapsearch",
        "-x",
        "-H",
        "ldap://localhost",
        "-D",
        "cn=admin,dc=infraticket,dc=local",
        "-w",
        "LdapLocal789!",
        "-b",
        "dc=infraticket,dc=local"
      ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================
  # 5. phpLDAPadmin
  # ==========================================================
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: infraticket_phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    depends_on:
      openldap:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ldapadmin.rule=Host(`ldap.infraticket.local`)"
      - "traefik.http.routers.ldapadmin.entrypoints=web"
      - "traefik.http.services.ldapadmin.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # ==========================================================
  # 6. PROMETHEUS
  # ==========================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: infraticket_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.infraticket.local`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: unless-stopped
    networks:
      - monitoring
      - frontend

  # ==========================================================
  # 7. GRAFANA
  # ==========================================================
  grafana:
    image: grafana/grafana:11.5.2
    container_name: infraticket_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://grafana.infraticket.local"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.infraticket.local`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    restart: unless-stopped
    networks:
      - monitoring
      - frontend

  # ==========================================================
  # 8. NODE EXPORTER
  # ==========================================================
  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: infraticket_node_exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ==========================================================
  # 9. cADVISOR
  # ==========================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: infraticket_cadvisor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ==========================================================
  # 10. ALERTMANAGER
  # ==========================================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: infraticket_alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.infraticket.local`)"
      - "traefik.http.routers.alertmanager.entrypoints=web"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
    restart: unless-stopped
    networks:
      - monitoring
      - frontend

# ==========================================================
# REDES
# ==========================================================
networks:
  socket-proxy:
    driver: bridge
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

# ==========================================================
# VOLÚMENES
# ==========================================================
volumes:
  mariadb_data:
  glpi_data:
  ldap_data:
  ldap_config:
  prometheus_data:
  grafana_data:
  alertmanager_data: